<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配移动端缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- 关键：开启苹果全屏模式支持，添加到主屏幕后隐藏顶部地址栏 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- 状态栏背景透明融合 -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>陪伴</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --chat-bg: #252525;
            --user-bubble: #0084ff;
            --character-bubble: #333333;
            --text-color: #e0e0e0;
            --subtext-color: #888;
            /* 获取系统安全区域高度，防止被刘海或底部黑条遮挡 */
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100%;
            height: 100%;
            /* 兼容旧版和新版移动浏览器的全屏高度计算 */
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; /* 禁止整个页面的滚动 */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
        }
        header {
            /* 顶部留出安全距离 */
            padding-top: calc(15px + var(--safe-top));
            padding-bottom: 15px;
            padding-left: 15px;
            padding-right: 15px;
            background-color: var(--chat-bg);
            text-align: center;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }
        header h1 {
            font-size: 18px;
            font-weight: 500;
        }
        header span {
            font-size: 12px;
            color: var(--subtext-color);
        }
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            -webkit-overflow-scrolling: touch; /* 顺滑滚动 */
        }
        .message-row {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .message-row.user {
            align-self: flex-end;
            align-items: flex-end;
        }
        .message-row.character {
            align-self: flex-start;
            align-items: flex-start;
        }
        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 16px;
            line-height: 1.5;
            word-break: break-word;
        }
        .user .bubble {
            background-color: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .character .bubble {
            background-color: var(--character-bubble);
            color: var(--text-color);
            border-bottom-left-radius: 4px;
        }
        .typing-indicator {
            font-size: 14px;
            color: var(--subtext-color);
            font-style: italic;
        }
        footer {
            /* 底部留出安全距离，防被小黑条遮挡 */
            padding-top: 10px;
            padding-bottom: calc(10px + var(--safe-bottom));
            padding-left: 10px;
            padding-right: 10px;
            background-color: var(--chat-bg);
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
            flex-shrink: 0;
        }
        #user-input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 20px;
            background-color: #333;
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }
        #send-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 20px;
            background-color: var(--user-bubble);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header>
        <h1 id="char-name">角色名</h1>
        <span>在线</span>
    </header>

    <div id="chat-box"></div>

    <footer>
        <input type="text" id="user-input" placeholder="输入消息..." autocomplete="off">
        <button id="send-btn">发送</button>
    </footer>

    <script>
        const CHARACTER_NAME = "许应清"; // 
        document.getElementById('char-name').innerText = CHARACTER_NAME;
        
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        
        let chatHistory = JSON.parse(localStorage.getItem('chatHistory')) || [];
        let isTyping = false;

        // 渲染单条消息
        function renderMessage(role, text) {
            const row = document.createElement('div');
            row.classList.add('message-row', role);
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            bubble.innerText = text;
            row.appendChild(bubble);
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
            return bubble;
        }

        // 打字机效果
        function typeWriter(element, text, speed = 50) {
            return new Promise(resolve => {
                let i = 0;
                element.innerText = '';
                const timer = setInterval(() => {
                    if (i < text.length) {
                        element.innerText += text.charAt(i);
                        i++;
                        chatBox.scrollTop = chatBox.scrollHeight;
                    } else {
                        clearInterval(timer);
                        resolve();
                    }
                }, speed);
            });
        }

        // 显示"正在输入"
        function showTypingIndicator() {
            const row = document.createElement('div');
            row.classList.add('message-row', 'character');
            row.id = 'typing-row';
            const indicator = document.createElement('div');
            indicator.classList.add('bubble', 'typing-indicator');
            indicator.innerText = '正在输入...';
            row.appendChild(indicator);
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTypingIndicator() {
            const typingRow = document.getElementById('typing-row');
            if (typingRow) typingRow.remove();
        }

        // 根据时间生成问候语
        function getTimeGreeting() {
            const hour = new Date().getHours();
            if (hour >= 5 && hour < 11) return `早安。昨晚睡得好吗？`;
            if (hour >= 11 && hour < 14) return `中午好。记得按时吃午饭，别饿坏肚子。`;
            if (hour >= 14 && hour < 18) return `下午好。想要干什么？`;
            if (hour >= 18 && hour < 23) return `晚上好。今天过得怎么样？`;
            return `夜深了。还没睡？注意休息，笨蛋。`;
        }

        // 初始化加载
        async function initChat() {
            if (chatHistory.length === 0) {
                const greeting = getTimeGreeting();
                showTypingIndicator();
                await new Promise(r => setTimeout(r, 1000)); // 模拟思考延迟
                removeTypingIndicator();
                const bubble = renderMessage('character', '');
                await typeWriter(bubble, greeting);
                chatHistory.push({ role: 'assistant', content: greeting });
                localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
            } else {
                // 加载历史记录
                chatHistory.forEach(msg => {
                    const role = msg.role === 'user' ? 'user' : 'character';
                    renderMessage(role, msg.content);
                });
            }
        }

        let idleTimer = null;

function startIdleTimer() {
  if (idleTimer) clearTimeout(idleTimer);
  idleTimer = setTimeout(async () => {
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: chatHistory, // ⚠️把这里换成你存聊天记录的变量名
          isIdle: true
        })
      });
      const data = await res.json();
      
      addMessage('许应清', data.reply); // ⚠️把这里换成你往屏幕加气泡的代码
      
      startIdleTimer();
    } catch (err) {
      console.log('失败');
    }
  }, 10 * 1000); // 先写10秒方便测试！
      }

        // 发送消息逻辑
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isTyping) return;

            isTyping = true;
            sendBtn.disabled = true;
            userInput.value = '';

            renderMessage('user', text);
            chatHistory.push({ role: 'user', content: text });
            localStorage.setItem('chatHistory', JSON.stringify(chatHistory));

            showTypingIndicator();

            try {
                // 调用后端 API
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: chatHistory })
                });

                if (!response.ok) throw new Error('网络错误');
                
                const data = await response.json();
                removeTypingIndicator();

                const replyText = data.reply;
                const bubble = renderMessage('character', '');

                  startIdleTimer(); // 👈 就加这一行！在函数的最后面
            }
                
                // 打字机效果显示回复
                await typeWriter(bubble, replyText);
                
                chatHistory.push({ role: 'assistant', content: replyText });
                localStorage.setItem('chatHistory', JSON.stringify(chatHistory));

            } catch (error) {
                removeTypingIndicator();
                renderMessage('character', '（信号好像不太好，稍后再试试吧）');
            } finally {
                isTyping = false;
                sendBtn.disabled = false;
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        initChat();
    </script>
</body>
</html>
